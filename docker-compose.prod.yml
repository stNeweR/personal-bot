version: '3.8'

services:
  nginx:
    image: nginx:latest
    volumes:
      - ./:/var/www
      - ./_docker/prod/nginx/conf.d:/etc/nginx/conf.d
    ports:
      - 80:80
    depends_on:
      - app
    container_name: bot_nginx

  app:
    build:
      context: .
      dockerfile: _docker/prod/php/Dockerfile
    volumes:
      - ./:/var/www
    container_name: bot_app
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - ./tmp/db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: bot_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - 8101:5432
    container_name: bot_db
