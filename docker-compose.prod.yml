version: "3.8"

services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src:/opt/app:ro
      - ./_docker/nginx/conf.d/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./storage/logs/nginx:/var/log/nginx
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - bot-network

  app:
    build:
      context: .
      dockerfile: _docker/php/Dockerfile
    container_name: app
    volumes:
      - ./src:/opt/app:ro
      - ./src/storage:/opt/app/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    restart: unless-stopped
    depends_on:
      - postgres
    networks:
      - bot-network

  postgres:
    image: postgres:15-alpine
    container_name: bot-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./_docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    restart: unless-stopped
    networks:
      - bot-network

volumes:
  postgres_data:

networks:
  bot-network:
    driver: bridge
